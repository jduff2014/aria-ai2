<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ARIA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080b14;
    --surface: #0d1220;
    --border:  #1c2540;
    --accent:  #5effd8;
    --accent2: #a78bfa;
    --accent3: #f472b6;
    --text:    #e2e8f8;
    --dim:     #4a5580;
    --user-bg: #1a2540;
    --ai-bg:   #0f1928;
    --glow:    0 0 20px rgba(94,255,216,0.2);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 40%, rgba(94,255,216,0.06) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 20%, rgba(167,139,250,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 90%, rgba(244,114,182,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 680px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(8,11,20,0.95);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(94,255,216,0.3);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 16px rgba(94,255,216,0.3); }
    50%       { box-shadow: 0 0 28px rgba(94,255,216,0.5); }
  }

  .header-info { flex: 1; }

  .header-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .header-status {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .header-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .header-btn:hover, .header-btn:active {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(10px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }

  .msg.ai .msg-avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 10px rgba(94,255,216,0.2);
  }

  .msg.user .msg-avatar {
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
  }

  .msg-content { max-width: 80%; }

  .msg-name {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .msg.user .msg-name { text-align: right; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    position: relative;
  }

  .msg.ai .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid rgba(167,139,250,0.2);
    border-top-right-radius: 4px;
    color: var(--text);
    text-align: left;
  }

  .msg-time {
    font-size: 9px;
    color: var(--dim);
    margin-top: 5px;
    letter-spacing: 1px;
  }
  .msg.user .msg-time { text-align: right; }

  /* Typing indicator */
  .typing-bubble {
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: typing 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30%            { transform: translateY(-6px); opacity: 1; }
  }

  /* Day divider */
  .day-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .day-divider::before, .day-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* INPUT */
  .input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: rgba(8,11,20,0.95);
    backdrop-filter: blur(20px);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: rgba(94,255,216,0.4);
    box-shadow: 0 0 12px rgba(94,255,216,0.08);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    overflow-y: auto;
  }

  textarea::placeholder { color: var(--dim); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 0 16px rgba(94,255,216,0.2);
  }

  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .send-btn svg { width: 18px; height: 18px; fill: #080b14; }

  /* Memory panel */
  .memory-panel {
    position: fixed;
    inset: 0;
    background: rgba(8,11,20,0.97);
    z-index: 100;
    display: none;
    flex-direction: column;
    padding: 24px 20px;
    overflow-y: auto;
  }

  .memory-panel.open { display: flex; }

  .memory-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 3px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .memory-section {
    margin-bottom: 20px;
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .memory-section h3 {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .memory-section p {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  .close-btn {
    margin-top: 20px;
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.2s;
  }
  .close-btn:active { border-color: var(--accent); }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: var(--dim);
  }

  .welcome-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 48px;
    letter-spacing: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .welcome p {
    font-size: 12px;
    letter-spacing: 2px;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="avatar">🧠</div>
    <div class="header-info">
      <div class="header-name">ARIA</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span>ONLINE · REMEMBERS EVERYTHING</span>
      </div>
    </div>
    <button class="header-btn" onclick="showMemory()">MEMORY</button>
  </header>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-logo">ARIA</div>
      <p>Your personal AI.<br>She remembers everything.<br>Forever.</p>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="Talk to ARIA..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<!-- MEMORY PANEL -->
<div class="memory-panel" id="memoryPanel">
  <div class="memory-title">🧠 ARIA's Memory</div>
  <div id="memoryContent"></div>
  <button class="close-btn" onclick="hideMemory()">CLOSE</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  let isTyping     = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function timeNow() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function addMessage(role, text) {
    // Remove welcome screen
    const welcome = messagesEl.querySelector('.welcome');
    if (welcome) welcome.remove();

    const msg  = document.createElement('div');
    msg.className = `msg ${role}`;

    const isAI   = role === 'ai';
    const avatar = isAI ? '🧠' : '👤';
    const name   = isAI ? 'ARIA' : 'YOU';

    msg.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-content">
        <div class="msg-name">${name}</div>
        <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
        <div class="msg-time">${timeNow()}</div>
      </div>
    `;

    messagesEl.appendChild(msg);
    scrollToBottom();
    return msg;
  }

  function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg ai';
    msg.id = 'typing';
    msg.innerHTML = `
      <div class="msg-avatar">🧠</div>
      <div class="msg-content">
        <div class="msg-name">ARIA</div>
        <div class="msg-bubble typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    `;
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isTyping) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    isTyping = true;
    sendBtn.disabled = true;

    addMessage('user', text);
    addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: text})
      });
      const data = await res.json();
      removeTyping();
      if (data.reply) {
        addMessage('ai', data.reply);
      } else {
        addMessage('ai', '⚠️ Error: ' + (data.error || 'Unknown error'));
      }
    } catch (err) {
      removeTyping();
      addMessage('ai', '⚠️ Could not reach ARIA. Is the server running?');
    }

    isTyping = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  async function showMemory() {
    const panel   = document.getElementById('memoryPanel');
    const content = document.getElementById('memoryContent');
    panel.classList.add('open');

    try {
      const res  = await fetch('/memory');
      const data = await res.json();
      const p    = data.profile;

      content.innerHTML = `
        <div class="memory-section">
          <h3>Who You Are</h3>
          <p>
            <b>Name:</b> ${p.name || 'Not yet shared'}<br>
            <b>Conversations:</b> ${p.conversations}<br>
            <b>First met:</b> ${p.first_met}<br>
            <b>3D Printer:</b> ${p.printer || 'Unknown'}<br>
            <b>Games:</b> ${p.games_played.join(', ') || 'None yet'}
          </p>
        </div>
        <div class="memory-section">
          <h3>Your Interests</h3>
          <p>${p.interests.length ? p.interests.join(', ') : 'Still learning about you...'}</p>
        </div>
        <div class="memory-section">
          <h3>Things I Remember</h3>
          <p>${p.facts.length ? p.facts.slice(-5).join('<br>') : 'Keep talking — I\'ll remember everything!'}</p>
        </div>
        <div class="memory-section">
          <h3>Recent Conversations</h3>
          ${data.memory.slice(-5).reverse().map(m => `
            <p style="margin-bottom:10px;border-bottom:1px solid #1c2540;padding-bottom:10px">
              <span style="color:#4a5580;font-size:11px">${m.date}</span><br>
              <b>You:</b> ${m.user}<br>
              <b>ARIA:</b> ${m.assistant.substring(0,100)}...
            </p>
          `).join('') || '<p>No past conversations yet.</p>'}
        </div>
      `;
    } catch {
      content.innerHTML = '<p>Could not load memory. Is the server running?</p>';
    }
  }

  function hideMemory() {
    document.getElementById('memoryPanel').classList.remove('open');
  }

  // Auto-focus input
  inputEl.focus();
</script>
</body>
</html>
